title: Action API Pattern
description: A pattern for decomposing IBM i green-screen applications into single-purpose, callable APIs that work for web, mobile, and AI agents.
url: "https://action-api-pattern.k3s.com"
baseurl: ""

remote_theme: just-the-docs/just-the-docs

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Google Analytics
ga_tracking: G-KJ93VCQ3EE
ga_tracking_anonymize_ip: true

# Top-right auxiliary links
aux_links:
  "View on GitHub":
    - "https://github.com/K3S/action-api-pattern"
  "Sponsored by K3S":
    - "https://k3s.com"
aux_links_new_tab: true

# External link in the sidebar
nav_external_links:
  - title: King III Solutions
    url: https://k3s.com
    hide_icon: false
  - title: RPG Tutorial
    url: https://rpgtutorial.k3s.com/
    hide_icon: false
  - title: IBM i Open Source Setup
    url: https://ospm.k3s.com/
    hide_icon: false
  - title: PHP, PDO & ODBC on IBM i
    url: https://odbcphp.k3s.com/
    hide_icon: false
  - title: AI Patterns For Business Systems
    url: https://aipatterns.k3s.com
    hide_icon: false
  - title: IBM i AI Workers
    url: https://ibmi-ai-workers.k3s.com
    hide_icon: false

# Heading anchors
heading_anchors: true

# Color scheme
color_scheme: light

# Callouts
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  caution:
    title: Caution
    color: red

# Footer
footer_content: 'Sponsored by <a href="https://k3s.com">King III Solutions</a>. Code released under the <a href="https://github.com/K3S/action-api-pattern/blob/main/LICENSE-CODE">MIT License</a>; content under <a href="https://github.com/K3S/action-api-pattern/blob/main/LICENSE-CONTENT">CC-BY-SA 4.0</a>. <a href="https://github.com/K3S/action-api-pattern">Contribute on GitHub</a>.'

# Last edited timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/K3S/action-api-pattern"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .github
  - vendor
  - node_modules
